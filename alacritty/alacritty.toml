[colors]
draw_bold_text_with_bright_colors = true

[font]
size = 8

[colors.primary]
background = "#242340"
foreground = "#cdd6f4"

[colors.normal]
black = "#45475a"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#f5c2e7"
cyan = "#94e2d5"
white = "#bac2de"

[colors.bright]
black = "#585b70"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#f5c2e7"
cyan = "#94e2d5"
white = "#a6adc8"

[font.normal]
family = "LigaSFMonoNerdFont"
style = "Regular"

[font.bold]
family = "LigaSFMonoNerdFont"
style = "Bold"

[font.bold_italic]
family = "LigaSFMonoNerdFont"
style = "Bold Italic"

[font.italic]
family = "LigaSFMonoNerdFont"
style = "Italic"

[window.dimensions]
columns = 128
lines = 33

[scrolling]
history = 10000
multiplier = 12

[general]
live_config_reload = true

[window.padding]
x = 8
y = 8
